architectury {
    common('fabric', 'forge')
}

dependencies {
    modApi "dev.architectury:architectury:${architectury_api_version}"
}

tasks.register('runLocalCharacterDefinitionTest', JavaExec) {
    dependsOn tasks.named('testClasses')
    classpath = sourceSets.test.runtimeClasspath
    mainClass = 'dev.soffits.openplayer.character.LocalCharacterDefinitionTest'
}

tasks.register('runOpenPlayerNetworkingTest', JavaExec) {
    dependsOn tasks.named('testClasses')
    classpath = sourceSets.test.runtimeClasspath
    mainClass = 'dev.soffits.openplayer.network.OpenPlayerNetworkingTest'
}

tasks.register('runLocalAssignmentRepositoryTest', JavaExec) {
    dependsOn tasks.named('testClasses')
    classpath = sourceSets.test.runtimeClasspath
    mainClass = 'dev.soffits.openplayer.character.LocalAssignmentRepositoryTest'
}

tasks.register('runLocalCharacterRepositoryWriteTest', JavaExec) {
    dependsOn tasks.named('testClasses')
    classpath = sourceSets.test.runtimeClasspath
    mainClass = 'dev.soffits.openplayer.character.LocalCharacterRepositoryWriteTest'
}

tasks.register('runRuntimeNpcIdentityKeyTest', JavaExec) {
    dependsOn tasks.named('testClasses')
    classpath = sourceSets.test.runtimeClasspath
    mainClass = 'dev.soffits.openplayer.runtime.RuntimeNpcIdentityKeyTest'
}

tasks.register('runCompanionLifecycleManagerTest', JavaExec) {
    dependsOn tasks.named('testClasses')
    classpath = sourceSets.test.runtimeClasspath
    mainClass = 'dev.soffits.openplayer.runtime.CompanionLifecycleManagerTest'
}

tasks.register('runLocalCharacterSkinTexturesTest', JavaExec) {
    dependsOn tasks.named('testClasses')
    classpath = sourceSets.test.runtimeClasspath
    mainClass = 'dev.soffits.openplayer.client.LocalCharacterSkinTexturesTest'
}

tasks.register('runOpenPlayerGalleryPageTest', JavaExec) {
    dependsOn tasks.named('testClasses')
    classpath = sourceSets.test.runtimeClasspath
    mainClass = 'dev.soffits.openplayer.client.OpenPlayerGalleryPageTest'
}

tasks.register('runNpcHotbarSelectionTest', JavaExec) {
    dependsOn tasks.named('testClasses')
    classpath = sourceSets.test.runtimeClasspath
    mainClass = 'dev.soffits.openplayer.entity.NpcHotbarSelectionTest'
}

tasks.register('runConversationLoopTest', JavaExec) {
    dependsOn tasks.named('testClasses')
    classpath = sourceSets.test.runtimeClasspath
    mainClass = 'dev.soffits.openplayer.conversation.ConversationLoopTest'
}

tasks.named('check') {
    dependsOn tasks.named('runLocalCharacterDefinitionTest')
    dependsOn tasks.named('runLocalAssignmentRepositoryTest')
    dependsOn tasks.named('runLocalCharacterRepositoryWriteTest')
    dependsOn tasks.named('runOpenPlayerNetworkingTest')
    dependsOn tasks.named('runRuntimeNpcIdentityKeyTest')
    dependsOn tasks.named('runCompanionLifecycleManagerTest')
    dependsOn tasks.named('runLocalCharacterSkinTexturesTest')
    dependsOn tasks.named('runOpenPlayerGalleryPageTest')
    dependsOn tasks.named('runNpcHotbarSelectionTest')
    dependsOn tasks.named('runConversationLoopTest')
}

architectury {
    common('fabric', 'forge')
}

dependencies {
    modApi "dev.architectury:architectury:${architectury_api_version}"
}

tasks.register('runLocalCharacterDefinitionTest', JavaExec) {
    dependsOn tasks.named('testClasses')
    classpath = sourceSets.test.runtimeClasspath
    mainClass = 'dev.soffits.openplayer.character.LocalCharacterDefinitionTest'
}

tasks.register('runOpenPlayerNetworkingTest', JavaExec) {
    dependsOn tasks.named('testClasses')
    classpath = sourceSets.test.runtimeClasspath
    mainClass = 'dev.soffits.openplayer.network.OpenPlayerNetworkingTest'
}

tasks.register('runRuntimeNpcIdentityKeyTest', JavaExec) {
    dependsOn tasks.named('testClasses')
    classpath = sourceSets.test.runtimeClasspath
    mainClass = 'dev.soffits.openplayer.runtime.RuntimeNpcIdentityKeyTest'
}

tasks.register('runCompanionLifecycleManagerTest', JavaExec) {
    dependsOn tasks.named('testClasses')
    classpath = sourceSets.test.runtimeClasspath
    mainClass = 'dev.soffits.openplayer.runtime.CompanionLifecycleManagerTest'
}

tasks.named('check') {
    dependsOn tasks.named('runLocalCharacterDefinitionTest')
    dependsOn tasks.named('runOpenPlayerNetworkingTest')
    dependsOn tasks.named('runRuntimeNpcIdentityKeyTest')
    dependsOn tasks.named('runCompanionLifecycleManagerTest')
}

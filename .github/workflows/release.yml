name: Release

on:
  push:
    tags:
      - '[0-9]*.[0-9]*.[0-9]*'
      - 'v[0-9]*.[0-9]*.[0-9]*'
  workflow_dispatch:
    inputs:
      tag:
        description: Version tag to release, for example 0.1.0-alpha.2+1.20.1 or v0.1.0-alpha.2+1.20.1
        required: true
        type: string

permissions:
  contents: write

jobs:
  github-release:
    runs-on: ubuntu-latest
    env:
      RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref }}
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle

      - name: Make Gradle wrapper executable
        run: chmod +x ./gradlew

      - name: Validate release tag version
        run: |
          VERSION_FROM_TAG="$RELEASE_TAG"
          VERSION_FROM_TAG="${VERSION_FROM_TAG#v}"
          MOD_VERSION="$(grep '^mod_version=' gradle.properties | cut -d= -f2-)"

          if ! [[ "$VERSION_FROM_TAG" =~ ^[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z-]+(\.[0-9A-Za-z-]+)*)?\+[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Release tag $RELEASE_TAG must be a SemVer mod version with Minecraft build metadata, optionally prefixed with v."
            exit 1
          fi

          if [ "$VERSION_FROM_TAG" != "$MOD_VERSION" ]; then
            echo "Release tag $VERSION_FROM_TAG does not match gradle.properties mod_version $MOD_VERSION."
            exit 1
          fi

          echo "VERSION_FROM_TAG=$VERSION_FROM_TAG" >> "$GITHUB_ENV"
          echo "ARTIFACT_VERSION=$VERSION_FROM_TAG" >> "$GITHUB_ENV"

      - name: Build release notes
        id: build_release_notes
        uses: mikepenz/release-changelog-builder-action@v6
        with:
          mode: COMMIT
          toTag: ${{ env.RELEASE_TAG }}
          failOnError: 'true'
          configurationJson: |
            {
              "template": "#{{CHANGELOG}}\n\n#{{RELEASE_DIFF}}",
              "empty_template": "No notable changes.\n\n#{{RELEASE_DIFF}}",
              "commit_template": "- #{{TITLE}}",
              "categories": [
                {
                  "title": "## Breaking Changes",
                  "rules": [
                    {
                      "pattern": "^(build|chore|ci|docs|feat|fix|perf|refactor|revert|style|test)(\\([\\w\\-.]+\\))?!: .+",
                      "on_property": "title"
                    }
                  ]
                },
                {
                  "title": "## Features",
                  "labels": ["feat"]
                },
                {
                  "title": "## Bug Fixes",
                  "labels": ["fix"]
                },
                {
                  "title": "## Performance",
                  "labels": ["perf"]
                },
                {
                  "title": "## Refactoring",
                  "labels": ["refactor"]
                },
                {
                  "title": "## Documentation",
                  "labels": ["docs"]
                },
                {
                  "title": "## CI/Build",
                  "labels": ["build", "ci", "chore"]
                },
                {
                  "title": "## Tests",
                  "labels": ["test"]
                },
                {
                  "title": "## Other",
                  "labels": []
                }
              ],
              "label_extractor": [
                {
                  "pattern": "^(build|chore|ci|docs|feat|fix|perf|refactor|revert|style|test)(\\([\\w\\-.]+\\))?(!)?: .+",
                  "on_property": "title",
                  "target": "$1"
                }
              ],
              "tag_resolver": {
                "method": "sort",
                "filter": {
                  "pattern": "^v?[0-9]+\\.[0-9]+\\.[0-9]+.*",
                  "flags": "gu"
                }
              }
            }
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build
        run: ./gradlew clean build

      - name: Collect runtime loader jars
        run: |
          mkdir -p release-artifacts

          fabric_jar="fabric/build/libs/openplayer-fabric-$ARTIFACT_VERSION.jar"
          forge_jar="forge/build/libs/openplayer-forge-$ARTIFACT_VERSION.jar"

          missing=0
          for jar in "$fabric_jar" "$forge_jar"; do
            if [ ! -f "$jar" ]; then
              echo "Expected runtime loader jar is missing: $jar"
              missing=1
            fi
          done

          if [ "$missing" -ne 0 ]; then
            exit 1
          fi

          cp "$fabric_jar" "$forge_jar" release-artifacts/

      - name: Prepare release notes file
        env:
          RELEASE_NOTES: ${{ steps.build_release_notes.outputs.changelog }}
        run: |
          notes_file="$RUNNER_TEMP/openplayer-release-notes.md"
          printf '%s\n' "$RELEASE_NOTES" > "$notes_file"
          echo "RELEASE_NOTES_FILE=$notes_file" >> "$GITHUB_ENV"

      - name: Create GitHub release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          prerelease_arg=()
          if [[ "$RELEASE_TAG" =~ (-alpha\.|-beta\.|-rc\.|-pre\.|-canary\.) ]]; then
            prerelease_arg=(--prerelease)
          fi

          gh release create "$RELEASE_TAG" \
            --title "$RELEASE_TAG" \
            --notes-file "$RELEASE_NOTES_FILE" \
            "${prerelease_arg[@]}" \
            release-artifacts/*.jar

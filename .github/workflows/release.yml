name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: Version tag to release, for example v0.1.0-alpha.1
        required: true
        type: string

permissions:
  contents: write

jobs:
  github-release:
    runs-on: ubuntu-latest
    env:
      RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref }}

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '17'

      - name: Make Gradle wrapper executable
        run: chmod +x ./gradlew

      - name: Validate release tag version
        run: |
          VERSION_FROM_TAG="${RELEASE_TAG#v}"
          MOD_VERSION="$(grep '^mod_version=' gradle.properties | cut -d= -f2-)"

          if [ "$VERSION_FROM_TAG" != "$MOD_VERSION" ]; then
            echo "Release tag version $VERSION_FROM_TAG does not match gradle.properties mod_version $MOD_VERSION."
            exit 1
          fi

          echo "VERSION_FROM_TAG=$VERSION_FROM_TAG" >> "$GITHUB_ENV"

      - name: Build
        run: ./gradlew clean build

      - name: Collect runtime loader jars
        run: |
          mkdir -p release-artifacts

          fabric_jar="fabric/build/libs/openplayer-fabric-$VERSION_FROM_TAG.jar"
          forge_jar="forge/build/libs/openplayer-forge-$VERSION_FROM_TAG.jar"

          missing=0
          for jar in "$fabric_jar" "$forge_jar"; do
            if [ ! -f "$jar" ]; then
              echo "Expected runtime loader jar is missing: $jar"
              missing=1
            fi
          done

          if [ "$missing" -ne 0 ]; then
            exit 1
          fi

          cp "$fabric_jar" "$forge_jar" release-artifacts/

      - name: Create GitHub release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          prerelease_arg=()
          if [[ "$RELEASE_TAG" =~ (-alpha|-beta|-rc|pre|canary) ]]; then
            prerelease_arg=(--prerelease)
          fi

          gh release create "$RELEASE_TAG" \
            --title "$RELEASE_TAG" \
            --generate-notes \
            "${prerelease_arg[@]}" \
            release-artifacts/*.jar
